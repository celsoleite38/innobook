{% extends 'base.html' %}
{% block title %}Pagamento pendente — Inno Book{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card p-5">
                <i class="bi bi-clock-history text-warning mb-4"
                   style="font-size:5rem;"></i>
                <h2 class="fw-bold mb-2">Pagamento em análise</h2>
                <p class="text-muted mb-4">
                    Seu pagamento está sendo processado.<br>
                    Assim que confirmado, seu eBook ficará disponível no dashboard.
                </p>
                <a href="{% url 'accounts:dashboard' %}" class="btn btn-primary">
                    <i class="bi bi-speedometer2"></i> Ir para o Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
