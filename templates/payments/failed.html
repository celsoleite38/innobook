{% extends 'base.html' %}
{% block title %}Pagamento falhou — BookHub{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card p-5">
                <i class="bi bi-x-circle-fill text-danger mb-4"
                   style="font-size:5rem;"></i>
                <h2 class="fw-bold mb-2">Pagamento não aprovado</h2>
                <p class="text-muted mb-4">
                    Houve um problema ao processar seu pagamento.<br>
                    Tente novamente ou escolha outro método.
                </p>
                <a href="{% url 'products:list' %}" class="btn btn-primary">
                    Voltar ao catálogo
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
