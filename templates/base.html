<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inno Book — Livraria Digital Premium{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold:       #c9a84c;
            --gold-light: #e8d5a3;
            --gold-dark:  #a07830;
            --navy:       #1a1a2e;
            --navy-soft:  #2d2d4e;
            --cream:      #f9f6f0;
            --text-muted-custom: #888;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            background: var(--cream);
            color: #222;
        }

        /* Tipografia */
        h1, h2, h3, h4, h5,
        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Divisor dourado */
        .gold-divider {
            width: 50px;
            height: 2px;
            background: var(--gold);
            margin: 0 auto 1rem;
        }
        .gold-divider-left {
            width: 50px;
            height: 2px;
            background: var(--gold);
            margin: 0 0 1rem;
        }

        /* Seção com linha */
        .section-label {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            text-align: center;
            margin-bottom: 6px;
            font-weight: 400;
        }
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 6px;
        }
        .section-sub {
            text-align: center;
            color: var(--text-muted-custom);
            font-size: 14px;
            margin-bottom: 2rem;
        }

        /* Botões */
        .btn-gold {
            background: var(--gold);
            color: var(--navy);
            font-size: 12px;
            font-weight: 500;
            padding: 10px 28px;
            border-radius: 3px;
            border: none;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            transition: background .2s;
        }
        .btn-gold:hover {
            background: var(--gold-dark);
            color: #fff;
        }
        .btn-navy {
            background: var(--navy);
            color: #f5f0e8;
            font-size: 12px;
            font-weight: 500;
            padding: 10px 28px;
            border-radius: 3px;
            border: none;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            transition: background .2s;
        }
        .btn-navy:hover { background: var(--navy-soft); color: #fff; }

        .btn-outline-gold {
            background: transparent;
            color: var(--gold);
            font-size: 12px;
            font-weight: 400;
            padding: 10px 28px;
            border-radius: 3px;
            border: 1px solid var(--gold);
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            transition: all .2s;
        }
        .btn-outline-gold:hover {
            background: var(--gold);
            color: var(--navy);
        }

        /* Cards de eBook */
        .ebook-card {
            background: #fff;
            border: 0.5px solid #e0d8cc;
            border-radius: 6px;
            overflow: hidden;
            transition: box-shadow .3s, transform .3s;
            height: 100%;
        }
        .ebook-card:hover {
            box-shadow: 0 8px 32px rgba(26,26,46,0.12);
            transform: translateY(-3px);
        }
        .ebook-card-img {
            height: 220px;
            object-fit: cover;
            width: 100%;
        }
        .ebook-card-img-placeholder {
            height: 220px;
            background: var(--navy);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
        }
        .ebook-card-body { padding: 1rem; }
        .ebook-card-cat {
            color: var(--gold);
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .ebook-card-title {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.4;
            color: #1a1a2e;
        }
        .ebook-card-author {
            color: var(--text-muted-custom);
            font-size: 12px;
            margin-bottom: 12px;
        }
        .ebook-price {
            color: var(--gold);
            font-size: 16px;
            font-weight: 500;
        }

        /* Badge dourado */
        .badge-gold {
            background: var(--gold);
            color: var(--navy);
            font-size: 9px;
            font-weight: 500;
            padding: 3px 8px;
            border-radius: 2px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Categoria pill */
        .cat-pill {
            background: transparent;
            border: 0.5px solid var(--gold);
            color: var(--gold);
            font-size: 11px;
            padding: 5px 16px;
            border-radius: 20px;
            cursor: pointer;
            letter-spacing: 0.5px;
            text-decoration: none;
            display: inline-block;
            transition: all .2s;
        }
        .cat-pill:hover, .cat-pill.active {
            background: var(--gold);
            color: var(--navy);
        }

        /* Cards de features */
        .feature-card {
            background: #fff;
            border: 0.5px solid #e0d8cc;
            border-radius: 6px;
            padding: 2rem;
            text-align: center;
            transition: box-shadow .3s;
        }
        .feature-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .feature-icon {
            width: 56px;
            height: 56px;
            background: var(--navy);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: var(--gold);
            font-size: 22px;
        }

        /* Alerts customizados */
        .alert { border-radius: 4px; font-size: 14px; }
        .alert-success { background: #f0f7f0; border: 0.5px solid #b8d8b8; color: #2d5a2d; }
        .alert-danger  { background: #fdf0f0; border: 0.5px solid #e8b8b8; color: #5a2d2d; }
        .alert-info    { background: #f0f4fd; border: 0.5px solid #b8c8e8; color: #2d3d5a; }
        .alert-warning { background: #fdf8f0; border: 0.5px solid #e8d8b8; color: #5a4a2d; }

        /* Form controls */
        .form-control, .form-select {
            border: 0.5px solid #d0c8bc;
            border-radius: 3px;
            font-size: 14px;
            padding: 10px 14px;
            background: #fff;
            transition: border-color .2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
        }
        .form-label {
            font-size: 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--navy);
            font-weight: 500;
            margin-bottom: 6px;
        }

        /* Seções cream */
        .bg-cream { background: var(--cream); }
        .bg-navy  { background: var(--navy); }
        .text-gold { color: var(--gold) !important; }
        .text-navy { color: var(--navy) !important; }

        /* Linha separadora elegante */
        .elegant-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 2rem;
        }
        .elegant-divider::before,
        .elegant-divider::after {
            content: '';
            flex: 1;
            height: 0.5px;
            background: #d0c8bc;
        }

        /* Tabelas */
        .table { font-size: 14px; }
        .table thead th {
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted-custom);
            font-weight: 500;
            border-bottom: 1px solid #d0c8bc;
            padding: 12px 16px;
        }
        .table td { padding: 12px 16px; border-color: #f0ebe3; }

        /* Footer */
        footer {
            background: var(--navy);
            color: #888;
            padding: 3rem 0 1.5rem;
        }
        footer .footer-brand {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 22px;
            margin-bottom: 8px;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    {% include 'partials/navbar.html' %}

    {% if messages %}
    <div class="container mt-3">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <main>{% block content %}{% endblock %}</main>

    {% include 'partials/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
